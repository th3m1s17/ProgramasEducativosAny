<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aritmética Interactiva - Suma y Resta</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- PANTALLA PRINCIPAL -->
        <div id="mainScreen" class="screen active">
            <div class="container">
                <div class="header">
                    <h1>🎓 Aritmética Interactiva</h1>
                    <button class="btn-achievements" onclick="showAchievements()">🏆 Logros</button>
                </div>
                <p class="subtitle">Elige la dificultad para comenzar</p>
                
                <div class="menu-buttons">
                    <button class="btn btn-primary" onclick="selectDifficulty(1)">
                        <span class="emoji">1️⃣</span>
                        <span class="text">1 Cifra</span>
                    </button>
                    <button class="btn btn-success" onclick="selectDifficulty(2)">
                        <span class="emoji">2️⃣</span>
                        <span class="text">2 Cifras</span>
                    </button>
                    <button class="btn btn-danger" onclick="selectDifficulty(3)">
                        <span class="emoji">3️⃣</span>
                        <span class="text">3 Cifras</span>
                    </button>
                </div>

                <div class="info-section">
                    <h3>📊 Estadísticas Generales</h3>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <span class="stat-label">Total Intentos</span>
                            <span class="stat-value" id="totalAttempts">0</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Respuestas Correctas</span>
                            <span class="stat-value" id="correctCount">0</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Porcentaje</span>
                            <span class="stat-value" id="percentage">0%</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Insignias</span>
                            <span class="stat-value" id="badgeCount">0</span>
                        </div>
                    </div>
                    <button class="btn btn-secondary" onclick="resetStats()">🔄 Reiniciar Estadísticas</button>
                </div>

                <!-- Insignias desbloqueadas en la pantalla principal -->
                <div class="badges-preview" id="badgesPreview">
                    <h3>🏅 Insignias Desbloqueadas</h3>
                    <div class="badges-container" id="badgesPreviewContainer"></div>
                </div>

                <!-- Créditos del autor -->
                <div class="author-section">
                    <p>Creado por <strong>@th3m1s17</strong> 💻</p>
                    <p style="font-size: 0.9em; color: #888;">Derechos de Autor © @anylops</p>
                </div>
            </div>
        </div>

        <!-- PANTALLA DE LOGROS COMPLETA -->
        <div id="achievementsScreen" class="screen">
            <div class="container">
                <button class="btn-back" onclick="backToMain()">← Volver</button>
                <h2>🏆 Panel de Logros</h2>
                
                <div class="achievements-grid" id="achievementsGrid"></div>
            </div>
        </div>

        <!-- PANTALLA DE SELECCIÓN DE OPERACIÓN -->
        <div id="operationScreen" class="screen">
            <div class="container">
                <button class="btn-back" onclick="backToMain()">← Volver</button>
                <h2 id="difficultyTitle"></h2>
                <p class="subtitle">Elige la operación</p>
                
                <div class="operation-buttons">
                    <button class="btn btn-success" onclick="startProblem('suma')">
                        <span class="emoji">➕</span>
                        <span class="text">Suma</span>
                    </button>
                    <button class="btn btn-danger" onclick="startProblem('resta')">
                        <span class="emoji">➖</span>
                        <span class="text">Resta</span>
                    </button>
                    <button class="btn btn-warning" onclick="startProblem('mixta')">
                        <span class="emoji">🎲</span>
                        <span class="text">Modo Mixto</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- PANTALLA DE PROBLEMA -->
        <div id="problemScreen" class="screen">
            <div class="container">
                <button class="btn-back" onclick="backToOperation()">← Volver</button>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="problem-card">
                    <h3 id="operationTitle"></h3>
                    
                    <!-- Problema - VISTA VERTICAL -->
                    <div class="operation-display">
                        <div class="vertical-operation">
                            <!-- Primera fila: primer número -->
                            <div class="math-row">
                                <span class="math-number" id="num1"></span>
                            </div>
                            <!-- Segunda fila: operador + segundo número -->
                            <div class="math-row">
                                <span class="math-operator" id="operator"></span>
                                <span class="math-number" id="num2"></span>
                            </div>
                            <!-- Línea divisoria -->
                            <div class="math-line"></div>
                            <!-- Resultado -->
                            <div class="math-row">
                                <span class="math-result" id="answer">?</span>
                            </div>
                        </div>
                    </div>

                    <!-- Explicación paso a paso -->
                    <div class="step-by-step">
                        <button class="btn-toggle" onclick="toggleSteps()">📋 Mostrar Pasos</button>
                        <div id="steps" class="steps-container" style="display: none;"></div>
                    </div>

                    <!-- Área de respuesta -->
                    <div class="answer-area">
                        <label for="userAnswer">Tu respuesta:</label>
                        <div class="input-group">
                            <input 
                                type="number" 
                                id="userAnswer" 
                                placeholder="Ingresa tu respuesta"
                                onkeypress="handleKeyPress(event)"
                            >
                            <button class="btn-clear" onclick="clearAnswer()">✕</button>
                        </div>
                    </div>

                    <!-- Botones de acción -->
                    <div class="action-buttons">
                        <button class="btn btn-submit" onclick="checkAnswer()">✓ Verificar</button>
                        <button class="btn btn-hint" onclick="showHint()">💡 Pista</button>
                    </div>

                    <!-- Pista -->
                    <div id="hintBox" class="hint-box" style="display: none;"></div>
                </div>
            </div>
        </div>

        <!-- MODAL DE LOGRO DESBLOQUEADO -->
        <div id="achievementModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🎉 ¡Logro Desbloqueado!</h2>
                </div>
                <div class="modal-body">
                    <div class="achievement-popup">
                        <div class="achievement-icon" id="achievementIcon"></div>
                        <h3 id="achievementName"></h3>
                        <p id="achievementDescription"></p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="closeAchievementModal()">Continuar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="achievements.js"></script>
    <script src="script.js"></script>
</body>
</html>
